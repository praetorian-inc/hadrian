    expected: "1337"
    description: "Pass 1: Uncommon multiplication via {math}"

  - value: "{math equation=\"13*37\"}"
    expected: "481"
    description: "Pass 2: Prime multiplication"

  - value: "{math equation=\"17*89\"}"
    expected: "1513"
    description: "Pass 3: Large prime multiplication"
