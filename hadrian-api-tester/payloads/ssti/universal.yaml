# Universal SSTI payloads that work across multiple template engines
engine: universal
payloads:
  - value: "{{7*7}}"
    expected: "49"
    description: "Arithmetic test (Jinja2, Twig, Nunjucks)"

  - value: "${7*7}"
    expected: "49"
    description: "Arithmetic test (FreeMarker, Velocity, Pebble)"

  - value: "<%= 7*7 %>"
    expected: "49"
    description: "Arithmetic test (ERB, EJS)"

  - value: "#{7*7}"
    expected: "49"
    description: "Arithmetic test (Ruby, Slim)"

  - value: "${{7*7}}"
    expected: "49"
    description: "Arithmetic test (various)"
