id: api8-path-traversal-dvga
info:
  name: "DVGA - Path Traversal via uploadPaste"
  category: "API8:2023 Security Misconfiguration"
  severity: "HIGH"
  author: "hadrian"
  description: "Tests for path traversal vulnerabilities in DVGA's uploadPaste mutation. The filename parameter is not properly sanitized, allowing attackers to write files to arbitrary locations on the filesystem using directory traversal sequences."
  tags: ["graphql", "dvga", "path-traversal", "file-upload"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: false

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

graphql:
  - query: |
      mutation PathTraversalBasic {
        uploadPaste(content: "hadrian-traversal-test", filename: "../../../tmp/evil.txt") {
          result
        }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["hadrian-traversal-test"]
        part: body

  - query: |
      mutation PathTraversalAbsolute {
        uploadPaste(content: "hadrian-absolute-test", filename: "/tmp/pwned.txt") {
          result
        }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["hadrian-absolute-test"]
        part: body

detection:
  success_indicators:
    - type: body_field
      body_field: "data.uploadPaste.result"
      exists: true
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "dvga_path_traversal_uploadpaste"
