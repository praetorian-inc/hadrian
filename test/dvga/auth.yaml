# DVGA Authentication Configuration
# For testing against Damn Vulnerable GraphQL Application
#
# Populate tokens by running Steps 3-5 in README.md, then either:
#   1. Use env vars: set -a && source test/dvga/.env && set +a
#   2. Replace ${...} placeholders below with actual JWT values
#
# NOTE: Bearer auth requires all roles to have a non-empty token.
# Unauthenticated testing does not require --auth; omit the flag instead.

method: bearer

roles:
  admin:
    # Admin user (default password: changeme)
    token: "${DVGA_ADMIN_TOKEN}"

  user:
    # Regular user (created in Step 3, password: user123)
    token: "${DVGA_USER1_TOKEN}"

  user2:
    # Second user for BOLA testing (created in Step 3, password: user456)
    token: "${DVGA_USER2_TOKEN}"
