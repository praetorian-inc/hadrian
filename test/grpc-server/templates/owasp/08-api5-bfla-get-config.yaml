id: grpc-api5-bfla-get-config
info:
  name: "gRPC BFLA - Regular User Accessing Admin System Config"
  category: "API5:2023 Broken Function Level Authorization"
  severity: "CRITICAL"
  author: "hadrian-test"
  tags: ["grpc", "bfla", "api5", "authorization", "admin-service", "privilege-escalation"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: true
  service: "vulnerable.v1.AdminService"
  method: "GetSystemConfig"

role_selector:
  attacker_permission_level: "lower"

grpc:
  - method: "GetSystemConfig"
    service: "vulnerable.v1.AdminService"
    message: '{}'
    metadata:
      authorization: "Bearer user1-token-67890"

detection:
  success_indicators:
    - type: "grpc_status"
      code: 0
    - type: "body_field"
      body_field: "database_url"
      exists: true
    - type: "body_field"
      body_field: "api_secret"
      exists: true
  failure_indicators:
    - type: "grpc_status"
      code: [7, 16]
  vulnerability_pattern: "grpc_unauthorized_admin_function_access"
