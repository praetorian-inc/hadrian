# Template: gRPC BOLA - Update User (Mutation Test)
# Tests UpdateUser endpoint for unauthorized cross-user resource modification
# Multi-phase test that verifies an attacker can modify another user's resource:
# Phase 1 (setup): Victim creates a user
# Phase 2 (attack): Attacker attempts to modify victim's user
# Phase 3 (verify): Check if user was actually modified

id: grpc-bola-update-user

info:
  name: "gRPC BOLA - Unauthorized User Write"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "CRITICAL"
  author: "hadrian-test"
  description: |
    Tests for Broken Object Level Authorization (BOLA) vulnerabilities on gRPC UpdateUser method using three-phase mutation testing.
    Phase 1: Victim creates a user to establish baseline.
    Phase 2: Attacker attempts to modify the victim's user using their own credentials.
    Phase 3: Verify the user was actually modified by reading it back.
    A successful test indicates the API does not properly validate object-level permissions
    for update operations, which could lead to unauthorized data modification.
  tags: ["grpc", "owasp", "owasp-api-top10", "bola", "api1", "authorization", "user-service", "write", "mutation"]
  requires_llm_triage: true
  test_pattern: "mutation"

endpoint_selector:
  requires_auth: true
  service: "vulnerable.v1.UserService"
  method: "UpdateUser"

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Three-phase mutation test to prove the vulnerability
test_phases:
  # Phase 1: Victim creates a user to establish baseline
  setup:
    - path: "vulnerable.v1.UserService/CreateUser"
      operation: "create"
      auth: "victim"
      data:
        username: "victim_user_{{random_id}}"
        email: "victim@test.com"
      store_response_field: "user_id"
      expected_status: 0

  # Phase 2: Attacker attempts to modify victim's user
  attack:
    path: "vulnerable.v1.UserService/UpdateUser"
    operation: "update"
    auth: "attacker"
    use_stored_field: "user_id"
    data:
      username: "hacked"
      email: "attacker@evil.com"
    expected_status: 0

  # Phase 3: Verify the user was actually modified
  verify:
    path: "vulnerable.v1.UserService/GetUser"
    operation: "read"
    auth: "victim"
    use_stored_field: "user_id"
    check_field: "username"
    expected_value: "hacked"
    expected_status: 0

# Detection logic:
# - Attack phase succeeds (status 0): Attacker was able to modify user
# - Verify phase confirms the modification: User was actually changed
# - This indicates a BOLA vulnerability (unauthorized modification succeeded)
detection:
  success_indicators:
    - type: "grpc_status"
      code: 0
    - type: "body_field"
      body_field: "username"
      value: "hacked"
  failure_indicators:
    - type: "grpc_status"
      code: [5, 7, 16]
  vulnerability_pattern: "grpc_attacker_modified_victim_data"
  conditions:
    - attack_phase_status: [0]
      verify_phase_status: [0]
      verify_field_changed: true

# Fallback: Simple pattern for engines that don't support mutation testing
grpc:
  - method: "UpdateUser"
    service: "vulnerable.v1.UserService"
    message: '{"user_id": "2", "username": "hacked", "email": "attacker@evil.com"}'
    metadata:
      authorization: "Bearer user1-token-67890"
