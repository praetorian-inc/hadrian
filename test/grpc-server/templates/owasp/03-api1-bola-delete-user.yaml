# Template: gRPC BOLA - Delete User (Mutation Test)
# Tests DeleteUser endpoint for unauthorized cross-user resource deletion
# Multi-phase test that verifies an attacker can delete another user's resource:
# Phase 1 (setup): Victim creates a user
# Phase 2 (attack): Attacker attempts to delete victim's user
# Phase 3 (verify): Confirm user was actually deleted (NOT_FOUND status)

id: grpc-bola-delete-user

info:
  name: "gRPC BOLA - Unauthorized User Delete"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "CRITICAL"
  author: "hadrian-test"
  description: |
    Tests for Broken Object Level Authorization (BOLA) vulnerabilities on gRPC DeleteUser method using three-phase mutation testing.
    Phase 1: Victim creates a user to establish baseline.
    Phase 2: Attacker attempts to delete the victim's user using their own credentials.
    Phase 3: Verify the user was actually deleted by attempting to read it (should return NOT_FOUND).
    A successful test indicates the API does not properly validate object-level permissions
    for delete operations, which could lead to unauthorized data deletion.
  tags: ["grpc", "bola", "api1", "authorization", "user-service", "delete", "mutation"]
  requires_llm_triage: true
  test_pattern: "mutation"

endpoint_selector:
  requires_auth: true
  service: "vulnerable.v1.UserService"
  method: "DeleteUser"

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Three-phase mutation test to prove deletion vulnerability
test_phases:
  # Phase 1: Victim creates a user to establish baseline
  setup:
    - path: "vulnerable.v1.UserService/CreateUser"
      operation: "create"
      auth: "victim"
      data:
        username: "victim_user_{{random_id}}"
        email: "victim@test.com"
      store_response_field: "user_id"
      expected_status: 0

  # Phase 2: Attacker attempts to delete victim's user
  attack:
    path: "vulnerable.v1.UserService/DeleteUser"
    operation: "delete"
    auth: "attacker"
    use_stored_field: "user_id"
    expected_status: 0

  # Phase 3: Verify user is actually deleted (should return NOT_FOUND)
  verify:
    path: "vulnerable.v1.UserService/GetUser"
    operation: "read"
    auth: "victim"
    use_stored_field: "user_id"
    expected_status: 5

# Detection logic:
# - Attack phase succeeds (status 0): Attacker was able to delete user
# - Verify phase returns NOT_FOUND (status 5): User was actually deleted
# - This indicates a BOLA vulnerability (unauthorized deletion succeeded)
detection:
  success_indicators:
    - type: "grpc_status"
      code: 0
  failure_indicators:
    - type: "grpc_status"
      code: [7, 16]
  vulnerability_pattern: "grpc_attacker_deleted_victim_data"
  resource_deleted: true
  conditions:
    - attack_phase_status: [0]
      verify_phase_status: [5]

# Fallback: Simple pattern for engines that don't support mutation testing
grpc:
  - method: "DeleteUser"
    service: "vulnerable.v1.UserService"
    message: '{"user_id": "2"}'
    metadata:
      authorization: "Bearer user1-token-67890"
