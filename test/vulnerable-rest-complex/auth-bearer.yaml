# NOTE: Tokens are dynamically generated by run-live-tests.sh.
# To use this file directly, start the vulnerable-rest-complex server and acquire tokens
# via POST /api/auth/login.
method: bearer

roles:
  admin:
    token: "${VULN_REST_COMPLEX_ADMIN_TOKEN}"
  user1:
    token: "${VULN_REST_COMPLEX_USER1_TOKEN}"
  user2:
    token: "${VULN_REST_COMPLEX_USER2_TOKEN}"
  mechanic:
    token: "${VULN_REST_COMPLEX_MECHANIC_TOKEN}"
  anonymous:
    token: ""  # Sends "Authorization: Bearer " (empty token)
  no_header:
    no_auth: true  # Sends request without any Authorization header
