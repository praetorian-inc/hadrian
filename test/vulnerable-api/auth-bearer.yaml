# NOTE: Tokens are dynamically generated by run-live-tests.sh.
# To use this file directly, start the vulnerable-api server and acquire tokens via POST /api/auth/login.
method: bearer

roles:
  admin:
    token: "${VULN_API_ADMIN_TOKEN}"
  user1:
    token: "${VULN_API_USER1_TOKEN}"
  user2:
    token: "${VULN_API_USER2_TOKEN}"
  anonymous:
    token: ""  # Sends "Authorization: Bearer " (empty token)
  no_header:
    no_auth: true  # Sends request without any Authorization header
