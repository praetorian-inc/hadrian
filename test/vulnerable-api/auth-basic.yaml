# Hadrian auth configuration for Basic HTTP authentication
# Usage: --auth auth-basic.yaml
#
# Start the API with: AUTH_METHOD=basic ./vulnerable-api
#
# NOTE: These are INTENTIONALLY INSECURE credentials for a deliberately
# vulnerable test server. They are NOT real credentials.

method: basic

roles:
  admin:
    username: "admin"
    password: "admin123"
  user1:
    username: "user1"
    password: "user1pass"
  user2:
    username: "user2"
    password: "user2pass"
  anonymous:
    username: ""
    password: ""  # Sends "Authorization: Basic Og==" (base64 of ":")
  empty_basic:
    credentials: ""  # Sends "Authorization: Basic " (empty base64)
  no_header:
    no_auth: true  # Sends request without any Authorization header
