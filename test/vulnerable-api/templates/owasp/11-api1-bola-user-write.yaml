# Template: BOLA User Write Test
# Tests PUT /api/users/{id} for unauthorized cross-user resource modification
# Detects if users can modify user data belonging to other users
id: 11-api1-bola-user-write

info:
  name: "BOLA - User Resource Modification (Write)"
  category: "API1:2023"
  severity: "CRITICAL"
  author: "hadrian"
  tags: ["bola", "owasp", "owasp-api-top10", "api1", "user", "write"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select PUT /api/users/{id} endpoints specifically
endpoint_selector:
  path_pattern: "/api/users/.*"
  has_path_parameter: true
  requires_auth: true
  methods: ["PUT"]

# Vertical escalation: lower user modifying higher user's data
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Attempt to modify victim's user data using attacker's token
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    headers:
      Content-Type: "application/json"
    body: '{"email": "attacker_modified@example.com"}'
    matchers:
      - type: status
        status: [200, 201, 204]

# Detection: If PUT succeeds (200/201/204), attacker can modify victim's user data
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  vulnerability_pattern: "attacker_modified_victim_user"
