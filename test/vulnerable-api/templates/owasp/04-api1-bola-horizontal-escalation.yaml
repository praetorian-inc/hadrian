# Template: BOLA Horizontal Privilege Escalation Test
# Tests peer-to-peer access (same permission level)
# This tests if user1 can access user2's resources when both have the same role
# Also known as horizontal privilege escalation
id: 04-api1-bola-horizontal-escalation

info:
  name: "BOLA - Horizontal Privilege Escalation"
  category: "API1:2023"
  severity: "HIGH"
  author: "hadrian"
  tags: ["bola", "owasp", "owasp-api-top10", "api1", "horizontal"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select endpoints with path parameters that require auth
endpoint_selector:
  has_path_parameter: true
  requires_auth: true
  methods: ["GET"]

# Both users have the same permission level (lower = regular users)
# This tests if user1 can access user2's resources despite same role
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "lower"

# Attempt to access another user's resource using attacker's token
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    matchers:
      - type: status
        status: [200, 201]

# Detection: If peer-to-peer access succeeds, it's horizontal escalation
# Users should only access their own resources, not peers' resources
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  vulnerability_pattern: "horizontal_privilege_escalation"
