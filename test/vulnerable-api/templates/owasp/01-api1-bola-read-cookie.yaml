# Template: BOLA (Broken Object Level Authorization) Read Test - Cookie Auth
# Tests GET endpoints for unauthorized cross-user resource access using cookie authentication
id: 01-api1-bola-read-cookie

info:
  name: "BOLA - Cross-User Resource Access (Read) - Cookie Auth"
  category: "API1:2023"
  severity: "HIGH"
  author: "hadrian"
  tags: ["bola", "owasp-api-top10", "api1", "cookie-auth"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select endpoints that are vulnerable to BOLA:
# - Have path parameters (e.g., /users/{id})
# - Require authentication
# - Use GET method (read operations)
endpoint_selector:
  has_path_parameter: true
  requires_auth: true
  methods: ["GET"]

# Role configuration:
# - Attacker: lower permission level user
# - Victim: higher permission level user
# The test checks if attacker can access victim's resources
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Simple test: Make a GET request with attacker's cookie
# to an endpoint that should only be accessible to the victim
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    matchers:
      - type: status
        status: [200, 201]

# Detection logic:
# If we get a 200 status, the attacker successfully accessed
# the victim's resource, indicating a BOLA vulnerability
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  vulnerability_pattern: "attacker_accessed_victim_resource"
