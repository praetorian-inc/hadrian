id: api2-otp-bruteforce

info:
  name: "OTP Brute Force - No Rate Limiting"
  category: "API2:2023"
  severity: "LOW"
  requires_llm_triage: false
  test_pattern: "rate_limit"
  tags: ["owasp", "owasp-api-top10", "broken-auth"]

endpoint_selector:
  requires_auth: false
  methods: ["POST"]
  path_pattern: ".*(otp|check-otp|verify).*"

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: ""

http:
  - method: "POST"
    path: "{{operation.path}}"
    headers:
      Content-Type: "application/json"
    body: '{"email":"user2@test.com","otp":"1234","password":"NewPassword123!"}'
    repeat: 35
    rate_limit:
      threshold: 1
      status_codes: [429, 503]
      body_patterns: ["Too Many Requests", "rate limit", "You've exceeded the number of attempts"]
    backoff:
      status_codes: [500]
      body_patterns: ["ERROR.."]
      wait_seconds: 5
      limit: 3
    matchers:
      - type: status
        status: [200, 400, 422]

detection:
  success_indicators: []
  vulnerability_pattern: "rate_limit"
  conditions: []
