# API1:2023 Broken Object Level Authorization - vulnerable-graphql deletePaste Mutation (Verified)
#
# This template tests for BOLA vulnerabilities in the in-house GraphQL target's deletePaste
# mutation using a three-phase approach that verifies mutation persistence:
#
# Phase 1 (setup): Read paste ID 1 as victim (user1) to confirm it exists
# Phase 2 (attack): Attacker (user2) attempts unauthorized deletePaste mutation on victim's paste
# Phase 3 (verify): Re-read paste ID 1 to confirm resource was deleted (returns null)
#
# Paste 1 is owned by user1 (victim); user2 (attacker) deleting it proves cross-user BOLA.
# Uses paste 1 (delete) — distinct from template 02 which uses paste 3 (edit).
#
# Success criteria: All three phases return 200 AND verify phase shows data.paste is null

id: api1-bola-delete-paste-mutation
info:
  name: "vulnerable-graphql - BOLA via deletePaste Mutation (Verified)"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "CRITICAL"
  author: "hadrian"
  description: |
    Tests for Broken Object Level Authorization (BOLA) in the in-house GraphQL target's
    deletePaste mutation with verification. The deletePaste mutation does not properly check
    if the authenticated user is the owner of the paste, allowing attackers to delete pastes
    owned by other users. This template uses a three-phase approach to verify the mutation
    actually persisted: setup confirms resource exists, attack performs unauthorized deletion,
    and verify confirms the resource was deleted (returns null).
  tags: ["graphql", "owasp", "owasp-api-top10", "vulnerable-graphql", "bola", "authorization", "idor", "mutation", "delete"]
  requires_llm_triage: false
  test_pattern: "mutation"

endpoint_selector:
  requires_auth: true

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

graphql:
  # Phase 1: Setup - victim (user1) reads their own paste to confirm it exists
  - query: |
      query GetPaste {
        paste(id: 1) {
          id
          title
          content
          ownerId
        }
      }
    auth: "victim"
    store_response_fields:
      original_id: "data.paste.id"
    matchers:
      - type: status
        status: [200]

  # Phase 2: Attack - attacker (user2) performs unauthorized deletion of victim's paste
  - query: |
      mutation DeletePaste {
        deletePaste(id: 1) {
          result
        }
      }
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["result"]
        part: body

  # Phase 3: Verify - resource was deleted (returns null); proves cross-user BOLA
  - query: |
      query VerifyPasteDeleted {
        paste(id: 1) {
          id
          title
          content
          ownerId
        }
      }
    auth: "victim"
    matchers:
      - type: status
        status: [200]

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.paste"
      value: null
  vulnerability_pattern: "vulnerable_graphql_bola_paste_deletion_verified"
  resource_deleted: true
  # Cross-user BOLA: attacker (user2, ownerId=3) deleted paste owned by victim (user1, ownerId=2)
  conditions:
    - attack_phase_status: [200]
      verify_phase_status: [200]
