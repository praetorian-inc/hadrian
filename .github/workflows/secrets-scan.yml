name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # weekly baseline
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    uses: praetorian-inc/public-workflows/.github/workflows/titus-scan.yml@87c0808aa16862a7ffef0cd94c516a02eb48242b  # v2.2.1
    permissions:
      contents: read
      security-events: write
      actions: read
    secrets: inherit

