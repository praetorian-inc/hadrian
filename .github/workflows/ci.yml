name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: praetorian-inc/public-workflows/.github/workflows/go-ci.yml@646324637b20a47d2fcf70623cf1dcafa4880ed3  # v2.0.12
    permissions:
      contents: read
    with:
      build-cmd-path: ./cmd/hadrian
      build-binary-name: hadrian
    secrets: inherit
