feature_name: "GraphQL API Security Testing Module"
feature_slug: "graphql-security-testing"
orchestration_skill: "orchestrating-feature-development"
created_at: "2026-02-02T00:00:00Z"
description: |
  Extend the API security testing framework to support comprehensive GraphQL API security testing.
  GraphQL APIs present unique security challenges due to their query-based nature, introspection
  capabilities, nested query structures, and different authorization patterns compared to REST APIs.

  This module must integrate seamlessly with the existing core framework, utilizing the same AAV
  (Assess-Attack-Verify) engine, LLM integration, proxy support, and reporting infrastructure while
  handling GraphQL-specific protocols and attack vectors.

