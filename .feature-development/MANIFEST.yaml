# Discovery summary (compacted from Gate 1)
codebase_discovery:
  completed_at: "2026-02-02T00:15:00Z"
  summary: |
    Hadrian is a plugin-based API security testing framework (~5,725 LOC).
    GraphQL protocol placeholder already exists in pkg/plugins/plugin.go.
    REST plugin in pkg/plugins/rest/ serves as reference implementation.
    Core infrastructure (templates, matchers, reporters, rate limiting) is reusable.
  key_patterns:
    - "Plugin self-registration via init()"
    - "Template-driven test execution"
    - "Role-based authorization testing"
    - "Three-phase mutation testing"
  extension_points:
    - "pkg/plugins/graphql/ (new)"
    - "pkg/graphql/ (new)"
    - "templates/graphql/ (new)"
  files_to_modify: 4
  files_to_create: 20
  full_details: ".feature-development/discovery.md"

# Security assessment
security_assessment:
  completed_at: "2026-02-02T01:00:00Z"
  output_file: "security-assessment.md"
  risk_rating: "MEDIUM-HIGH (unmitigated) / LOW (with controls)"
  key_recommendations:
    - "Use parameterized queries with variables map, never string concatenation"
    - "Validate schema size, type count, and field count on introspection"
    - "Apply existing production safety checks to GraphQL endpoints"
    - "Use gqlparser for SDL parsing (no eval/exec)"
    - "All logging must pass through existing Redactor"
  attack_templates_recommended:
    - "graphql-alias-bombing.yaml"
    - "graphql-graphiql-disclosure.yaml"
    - "graphql-persisted-query-bypass.yaml"

# Architecture plan summary
architecture_plan:
  completed_at: "2026-02-02T02:30:00Z"
  output_file: "architecture.md"
  summary: |
    Plugin-based extension implementing existing Plugin interface, reusing core
    runner/template/matcher infrastructure. Adds GraphQL-specific schema parsing
    (SDL via gqlparser, introspection JSON), query construction, and attack patterns.
  key_decisions:
    - "Self-register via init() - matches REST plugin pattern"
    - "gqlparser/v2 for SDL parsing - battle-tested library"
    - "One Operation per Query/Mutation field - aligns with REST model"
    - "CLI subcommands: test rest, test graphql - explicit, extensible"
    - "Permission format: <action>:<Type.field>:<scope> - extends existing"
  tasks:
    total: 20
    batches: 7
    batch_1: "T001-T002: Core Plugin Infrastructure"
    batch_2: "T003-T004: Schema Parsing (SDL + Introspection)"
    batch_3: "T005-T006: Operation Conversion + Plugin Complete"
    batch_4: "T007-T008: Query Construction & Execution"
    batch_5: "T009-T010: Attack Patterns"
    batch_6: "T011-T018: CLI, Templates, Model Extensions"
    batch_7: "T019-T020: Test Infrastructure (DVGA)"

