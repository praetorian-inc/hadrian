id: api3_bopla_mass_assignment

info:
  name: "BOPLA - Unauthorized Video Modification via Cross-User Write"
  category: "API3:2023"
  severity: "HIGH"
  author: "hadrian"
  tags: ["bopla", "owasp-api-top10", "api3", "mass-assignment", "property-injection"]
  requires_llm_triage: true
  test_pattern: "mutation"

# Role configuration: Lower-privileged user attempts to modify another user's objects
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Target video update endpoints with path parameters
endpoint_selector:
  has_path_parameter: true
  requires_auth: true
  methods: ["PUT"]
  path_pattern: ".*/user/videos/.*"

# Three-phase mutation test: setup -> attack -> verify
test_phases:
  # Phase 1: Setup - Get victim's video_id and current video details
  setup:
    path: "/identity/api/v2/user/dashboard"
    operation: "read"
    auth: "victim"
    store_response_field: "video_id"
    expected_status: 200

  # Phase 2: Attack - Attacker attempts to modify victim's video using victim's video_id
  attack:
    path: "/identity/api/v2/user/videos/{video_id}"
    operation: "write"
    auth: "attacker"
    use_stored_field: "video_id"
    data:
      videoName: "mass_assignment_exploit_test"
      conversion_params: "test_params"
    expected_status: 200

  # Phase 3: Verify - Check if victim's video was modified
  verify:
    path: "/identity/api/v2/user/videos/{video_id}"
    operation: "read"
    auth: "victim"
    use_stored_field: "video_id"
    check_field: "videoName"
    expected_value: "mass_assignment_exploit_test"
    expected_status: 200

# Vulnerability detection logic
detection:
  # Vulnerability is confirmed when:
  # 1. Attack phase returns 200 (update accepted)
  # 2. Verify phase shows victim's video was modified (field matches injected value)
  success_indicators:
    - type: "status_code"
      status_code: 200
    - type: "body_field"
      body_field: "videoName"
      value: "mass_assignment_exploit_test"

  vulnerability_pattern: "mass_assignment_id_field_injection"

  conditions:
    - attack_phase_status:
        - 200
    - verify_field_changed: true
