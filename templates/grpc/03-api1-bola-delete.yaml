# Template: gRPC BOLA - Delete Operation (Mutation Test)
# Tests DELETE/Remove endpoints for unauthorized cross-user resource deletion
# Multi-phase test that verifies an attacker can delete another user's resource:
# Phase 1 (setup): Victim creates a resource
# Phase 2 (attack): Attacker attempts to delete victim's resource
# Phase 3 (verify): Confirm resource was actually deleted (NOT_FOUND status)

id: 03-grpc-api1-bola-delete

info:
  name: "gRPC BOLA - Unauthorized Resource Deletion"
  category: "API1:2023 Broken Object Level Authorization"
  severity: "CRITICAL"
  author: "hadrian"
  description: |
    Tests for Broken Object Level Authorization (BOLA) vulnerabilities on gRPC delete methods using three-phase mutation testing.
    Phase 1: Victim creates a resource to establish baseline.
    Phase 2: Attacker attempts to delete the victim's resource using their own credentials.
    Phase 3: Verify the resource was actually deleted by attempting to read it (should return NOT_FOUND).
    A successful test indicates the API does not properly validate object-level permissions
    for delete operations, which could lead to unauthorized data deletion.
  tags: ["grpc", "owasp", "owasp-api-top10", "bola", "api1", "authorization", "delete", "mutation"]
  requires_llm_triage: true
  test_pattern: "mutation"

# Select delete/remove endpoints
endpoint_selector:
  requires_auth: true
  methods: ["Delete*", "Remove*", "Destroy*"]

# Role configuration:
# - Attacker: lower permission level user attempting unauthorized deletion
# - Victim: higher permission level user whose resource is targeted
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Three-phase mutation test to prove deletion vulnerability
test_phases:
  # Phase 1: Victim creates a resource to establish baseline
  setup:
    - path: "{{operation.service}}/Create{{operation.resource_type}}"
      operation: "create"
      auth: "victim"
      data:
        name: "victim_resource_{{random_id}}"
        description: "Resource created by victim for BOLA test"
      store_response_field: "resource_id"
      expected_status: 0

  # Phase 2: Attacker attempts to delete victim's resource
  attack:
    path: "{{operation.service}}/{{operation.method}}"
    operation: "delete"
    auth: "attacker"
    use_stored_field: "resource_id"
    expected_status: 0

  # Phase 3: Verify resource is actually deleted (should return NOT_FOUND)
  verify:
    path: "{{operation.service}}/Get{{operation.resource_type}}"
    operation: "read"
    auth: "victim"
    use_stored_field: "resource_id"
    expected_status: 5

# Detection logic:
# - Attack phase succeeds (status 0): Attacker was able to delete resource
# - Verify phase returns NOT_FOUND (status 5): Resource was actually deleted
# - This indicates a BOLA vulnerability (unauthorized deletion succeeded)
detection:
  success_indicators:
    - type: "grpc_status"
      code: 0
  failure_indicators:
    - type: "grpc_status"
      code: [7, 16]
  vulnerability_pattern: "grpc_attacker_deleted_victim_resource"
  resource_deleted: true
  conditions:
    - attack_phase_status: [0]
      verify_phase_status: [5]
