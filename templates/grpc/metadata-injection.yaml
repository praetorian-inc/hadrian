id: grpc-metadata-injection
info:
  name: "gRPC Metadata Header Injection"
  category: "API8:2023 Security Misconfiguration"
  severity: "MEDIUM"
  author: "hadrian"
  tags: ["grpc", "injection", "metadata"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: true

role_selector:
  attacker_permission_level: "lower"

grpc:
  - method: "{{operation.method}}"
    service: "{{operation.service}}"
    message: '{}'
    metadata:
      authorization: "Bearer {{attacker_token}}"
      x-forwarded-for: "127.0.0.1"
      x-real-ip: "127.0.0.1"

detection:
  success_indicators:
    - type: "grpc_status"
      code: 0
  vulnerability_pattern: "grpc_metadata_injection_allowed"
