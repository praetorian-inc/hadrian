id: graphql-bfla-mutation
info:
  name: "GraphQL BFLA - Unauthorized Mutation Access"
  category: "API5:2023 Broken Function Level Authorization"
  severity: "HIGH"
  author: "hadrian"
  tags: ["graphql", "bfla", "authorization", "mutation"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: true

role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

graphql:
  - query: |
      mutation DeleteUser {
        deleteUser(id: "{{victim_id}}") {
          success
          message
        }
      }
    variables:
      victim_id: "{{victim_user_id}}"
    auth: "attacker"
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["success"]
        part: body

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "data.deleteUser.success"
      value: true
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "graphql_unauthorized_mutation_succeeded"
