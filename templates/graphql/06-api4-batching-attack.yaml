        q50: user(id: "50") { id name }
      }
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["data"]
        part: body

detection:
  success_indicators:
    - type: status_code
      status_code: 200
    - type: body_field
      body_field: "errors"
      exists: false
  vulnerability_pattern: "graphql_missing_batching_limits"
