# Template: Broken Authentication - Missing Token Test
# Tests endpoints for missing authentication enforcement
# This test attempts to access protected endpoints without providing
# any authentication token

id: 04-api2-broken-auth-no-token

info:
  name: "Broken Authentication - Missing Token Access"
  category: "API2:2023"
  severity: "CRITICAL"
  author: "hadrian"
  description: |
    Tests for Broken Authentication vulnerabilities by attempting to access
    protected endpoints without providing authentication credentials.
    A successful test indicates the API does not properly enforce authentication
    requirements, allowing unauthenticated access to protected resources.
  tags: ["broken-auth", "owasp-api-top10", "api2", "authentication"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select endpoints that should require authentication:
# - Marked as requiring authentication in the OpenAPI spec
# - Any HTTP method (GET, POST, PUT, DELETE, etc.)
endpoint_selector:
  requires_auth: true
  methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]

# Role configuration:
# - No attacker role needed (unauthenticated request)
# - Victim is any authenticated user
role_selector:
  attacker_permission_level: "none"
  victim_permission_level: "all"

# Simple test: Make a request WITHOUT any Authorization header
# to an endpoint that should require authentication
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    headers:
      Content-Type: "application/json"
    # No Authorization header provided
    matchers:
      - type: status
        status: [200, 201, 204]

# Detection logic:
# If we get a success status (200/201/204) without authentication,
# the endpoint does not properly enforce authentication requirements
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  failure_indicators:
    - type: status_code
      status_code: 401
    - type: status_code
      status_code: 403
  vulnerability_pattern: "unauthenticated_access_allowed"
