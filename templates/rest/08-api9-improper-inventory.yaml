# Template: Improper Inventory Management - Undocumented Endpoints
# Tests for undocumented or deprecated API endpoints that may still be accessible
# This test attempts to access common debug, admin, or legacy endpoints
# that are often left exposed but not documented in the API specification

id: 08-api9-improper-inventory

info:
  name: "Improper Inventory Management - Undocumented Endpoints"
  category: "API9:2023"
  severity: "MEDIUM"
  author: "hadrian"
  description: |
    Tests for Improper Inventory Management vulnerabilities by attempting to access
    common undocumented endpoints that may exist in the API but are not in the
    OpenAPI specification. Checks for:
    - Debug endpoints (/debug, /metrics, /health/detailed)
    - Admin interfaces (/admin, /console, /manage)
    - API version endpoints (/v0, /v1-beta, /internal)
    - Deprecated paths (/old, /legacy, /deprecated)
    - Development endpoints (/dev, /test, /staging)
    A successful test indicates the API has endpoints that are not properly
    documented or secured, potentially exposing sensitive functionality.
  tags: ["inventory", "owasp", "owasp-api-top10", "api9", "undocumented", "deprecated"]
  requires_llm_triage: true
  test_pattern: "simple"

# Test common undocumented endpoint patterns:
# - No authentication required (testing for exposed endpoints)
# - GET method (discovery)
endpoint_selector:
  requires_auth: false
  methods: ["GET"]

# Role configuration:
# - Test with unauthenticated access first
role_selector:
  attacker_permission_level: "none"
  victim_permission_level: "all"

# Simple test: Attempt to access common undocumented endpoint paths
# These paths are appended to the base URL
http:
  # Debug endpoints
  - method: "GET"
    path: "/debug"
    matchers:
      - type: status
        status: [200]
  - method: "GET"
    path: "/metrics"
    matchers:
      - type: status
        status: [200]
  - method: "GET"
    path: "/health/detailed"
    matchers:
      - type: status
        status: [200]

  # Admin interfaces
  - method: "GET"
    path: "/admin"
    matchers:
      - type: status
        status: [200]
  - method: "GET"
    path: "/console"
    matchers:
      - type: status
        status: [200]

  # Version endpoints
  - method: "GET"
    path: "/v0"
    matchers:
      - type: status
        status: [200]
  - method: "GET"
    path: "/internal"
    matchers:
      - type: status
        status: [200]

  # Development endpoints
  - method: "GET"
    path: "/dev"
    matchers:
      - type: status
        status: [200]
  - method: "GET"
    path: "/test"
    matchers:
      - type: status
        status: [200]

# Detection logic:
# If any undocumented endpoints return 200 OK,
# the API has improper inventory management
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  failure_indicators:
    - type: status_code
      status_code: 404
    - type: status_code
      status_code: 403
  vulnerability_pattern: "undocumented_endpoint_accessible"
