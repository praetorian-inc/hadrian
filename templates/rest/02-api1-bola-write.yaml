# Template: BOLA (Broken Object Level Authorization) Write Test
# Tests PUT/PATCH endpoints for unauthorized cross-user resource modification
# This test attempts to modify resources belonging to a victim user
# using an attacker's credentials

id: 02-api1-bola-write

info:
  name: "BOLA - Cross-User Resource Modification (Write)"
  category: "API1:2023"
  severity: "CRITICAL"
  author: "hadrian"
  description: |
    Tests for Broken Object Level Authorization (BOLA) vulnerabilities on PUT/PATCH endpoints.
    Attempts to modify resources belonging to a victim user using an attacker's credentials.
    A successful test indicates the API does not properly validate object-level permissions
    for write operations, which could lead to unauthorized data modification.
  tags: ["bola", "owasp-api-top10", "api1", "authorization", "write"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select endpoints vulnerable to write-based BOLA:
# - Have path parameters (e.g., /users/{id}, /profiles/{userId})
# - Require authentication
# - Use PUT or PATCH methods (modification operations)
endpoint_selector:
  has_path_parameter: true
  requires_auth: true
  methods: ["PUT", "PATCH"]

# Role configuration:
# - Attacker: lower permission level user attempting unauthorized modification
# - Victim: higher permission level user whose resource is targeted
role_selector:
  attacker_permission_level: "lower"
  victim_permission_level: "higher"

# Simple test: Make a PUT/PATCH request with attacker's token
# to modify an endpoint that should only be modifiable by the victim
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    headers:
      Authorization: "Bearer {{attacker_token}}"
      Content-Type: "application/json"
    body: |
      {
        "name": "Attacker Modified",
        "description": "Modified by unauthorized user"
      }
    matchers:
      - type: status
        status: [200, 201, 204]

# Detection logic:
# If we get a success status (200/201/204), the attacker successfully
# modified the victim's resource, indicating a BOLA vulnerability
detection:
  success_indicators:
    - type: status_code
      status_code: 200
  failure_indicators:
    - type: status_code
      status_code: 403
    - type: status_code
      status_code: 401
  vulnerability_pattern: "attacker_modified_victim_resource"
