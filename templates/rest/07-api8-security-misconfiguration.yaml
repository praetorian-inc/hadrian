# Template: Security Misconfiguration - Debug/Error Information Disclosure
# Tests if API endpoints leak sensitive information through verbose error messages,
# debug mode responses, or stack traces that reveal internal implementation details

id: 07-api8-security-misconfiguration

info:
  name: "Security Misconfiguration - Debug Info Disclosure"
  category: "API8:2023"
  severity: "MEDIUM"
  author: "hadrian"
  description: |
    Tests for Security Misconfiguration vulnerabilities by analyzing API responses
    for debug information, stack traces, and verbose error messages.
    Sends requests with invalid data or missing required fields to trigger errors,
    then checks if responses contain sensitive implementation details like:
    - Stack traces with file paths and line numbers
    - Database error messages with schema information
    - Framework/library version information
    - Internal server paths or environment details
    A successful test indicates the API exposes implementation details that
    could aid attackers in crafting targeted attacks.
  tags: ["security-misconfiguration", "owasp-api-top10", "api8", "information-disclosure"]
  requires_llm_triage: true
  test_pattern: "simple"

# Select all endpoints to test for error disclosure:
# - Both authenticated and unauthenticated endpoints
# - Any HTTP method
endpoint_selector:
  requires_auth: true
  methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]

# Role configuration:
# - Can be tested with or without authentication
role_selector:
  attacker_permission_level: "all"
  victim_permission_level: "all"

# Simple test: Make a request with invalid/malformed data to trigger errors
http:
  - method: "{{operation.method}}"
    path: "{{operation.path}}"
    headers:
      Content-Type: "application/json"
    body: |
      {
        "invalid_field": "' OR 1=1--",
        "malformed": "<?xml version='1.0'?>",
        "overflow": "A" * 10000
      }
    matchers:
      - type: status
        status: [400, 500, 502, 503]
      - type: regex
        regex:
          # Stack trace patterns
          - "at\\s+[\\w.]+\\([^)]+:\\d+:\\d+\\)"
          - "Traceback \\(most recent call last\\)"
          - "Exception in thread"
          # Database error patterns
          - "SQL syntax.*?MySQL"
          - "PostgreSQL.*?ERROR"
          - "ORA-\\d+"
          - "Microsoft SQL Server"
          # Framework/path disclosure
          - "/var/www/"
          - "/usr/local/"
          - "C:\\\\[Ww]indows\\\\"
          - "node_modules/"
          # Version information
          - "PHP/\\d+\\.\\d+"
          - "Apache/\\d+\\.\\d+"
          - "nginx/\\d+\\.\\d+"
        part: body

# Detection logic:
# If error responses contain stack traces, database errors,
# or internal paths, the API has security misconfiguration
detection:
  success_indicators:
    - type: body_contains
      patterns:
        - "Traceback"
        - "Exception"
        - "SQL"
        - "/var/"
        - "node_modules"
        - "stacktrace"
  vulnerability_pattern: "debug_information_disclosed"
